<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px;
    height: 630px;
    background: #0a0a0a;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    overflow: hidden;
  }
  .card {
    width: 1200px;
    height: 630px;
    background: linear-gradient(135deg, #0a0a0a 0%, #111 50%, #0a1a15 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }
  .card::before {
    content: '';
    position: absolute;
    top: -200px;
    right: -200px;
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, rgba(0,212,170,0.08) 0%, transparent 70%);
    border-radius: 50%;
  }
  .card::after {
    content: '';
    position: absolute;
    bottom: -150px;
    left: -150px;
    width: 500px;
    height: 500px;
    background: radial-gradient(circle, rgba(0,212,170,0.05) 0%, transparent 70%);
    border-radius: 50%;
  }
  .collab {
    display: flex;
    align-items: center;
    gap: 2rem;
    margin-bottom: 2.5rem;
    z-index: 1;
  }
  .brand {
    font-size: 3.2rem;
    font-weight: 700;
    letter-spacing: -1px;
  }
  .ap { color: #00d4aa; }
  .kite { color: #fff; }
  .x {
    font-size: 2rem;
    color: #555;
    font-weight: 300;
  }
  .tagline {
    font-size: 1.4rem;
    color: #888;
    text-align: center;
    max-width: 700px;
    line-height: 1.6;
    z-index: 1;
    margin-bottom: 2rem;
  }
  .stats {
    display: flex;
    gap: 3rem;
    z-index: 1;
    margin-bottom: 2.5rem;
  }
  .stat {
    text-align: center;
  }
  .stat-value {
    font-size: 2rem;
    font-weight: 700;
    color: #00d4aa;
  }
  .stat-label {
    font-size: 0.85rem;
    color: #666;
    margin-top: 0.25rem;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .pills {
    display: flex;
    gap: 0.75rem;
    z-index: 1;
  }
  .pill {
    background: rgba(0,212,170,0.1);
    border: 1px solid rgba(0,212,170,0.2);
    color: #00d4aa;
    padding: 0.5rem 1.2rem;
    border-radius: 100px;
    font-size: 0.85rem;
    font-weight: 500;
  }
  .border-line {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 4px;
    background: linear-gradient(90deg, transparent, #00d4aa, transparent);
  }
</style>
</head>
<body>
  <div class="card">
    <div class="collab">
      <span class="brand ap">AgentProof</span>
      <span class="x">&times;</span>
      <span class="brand kite">Kite AI</span>
    </div>
    <div class="tagline">
      On-chain reputation oracle for AI agents.<br>
      x402 payment scoring. W3C Verifiable Credentials. Kite Passport DIDs.
    </div>
    <div class="stats">
      <div class="stat">
        <div class="stat-value">0-100</div>
        <div class="stat-label">Trust Score</div>
      </div>
      <div class="stat">
        <div class="stat-value">6</div>
        <div class="stat-label">Scoring Signals</div>
      </div>
      <div class="stat">
        <div class="stat-value">x402</div>
        <div class="stat-label">Payment Gated</div>
      </div>
    </div>
    <div class="pills">
      <span class="pill">ERC-8004</span>
      <span class="pill">Kite Chain</span>
      <span class="pill">W3C VC</span>
      <span class="pill">x402 Protocol</span>
    </div>
    <div class="border-line"></div>
  </div>
</body>
</html>
