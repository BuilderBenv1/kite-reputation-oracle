<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AgentProof — Kite Reputation Oracle</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, monospace;
      background: #0a0a0a;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem;
    }
    h1 { color: #00d4aa; font-size: 1.8rem; margin-bottom: 0.5rem; }
    .subtitle { color: #888; margin-bottom: 2rem; font-size: 0.9rem; }
    .card {
      background: #141414;
      border: 1px solid #222;
      border-radius: 12px;
      padding: 2rem;
      width: 100%;
      max-width: 520px;
      margin-bottom: 1.5rem;
    }
    label { display: block; color: #aaa; font-size: 0.85rem; margin-bottom: 0.5rem; }
    input {
      width: 100%;
      padding: 0.75rem;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 8px;
      color: #fff;
      font-size: 0.95rem;
      margin-bottom: 1rem;
    }
    input:focus { outline: none; border-color: #00d4aa; }
    button {
      width: 100%;
      padding: 0.75rem;
      background: #00d4aa;
      color: #0a0a0a;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    button:hover { opacity: 0.9; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .score-display {
      text-align: center;
      padding: 2rem 0;
    }
    .score-number {
      font-size: 4rem;
      font-weight: 700;
      color: #00d4aa;
    }
    .score-label { color: #888; font-size: 0.85rem; }
    .signals-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.75rem;
      margin-top: 1rem;
    }
    .signal {
      background: #1a1a1a;
      border-radius: 8px;
      padding: 0.75rem;
    }
    .signal-name { color: #888; font-size: 0.75rem; text-transform: uppercase; }
    .signal-value { color: #00d4aa; font-size: 1.2rem; font-weight: 600; }
    .vc-section { margin-top: 1rem; }
    .vc-json {
      background: #1a1a1a;
      border-radius: 8px;
      padding: 1rem;
      font-size: 0.75rem;
      overflow-x: auto;
      max-height: 300px;
      overflow-y: auto;
      white-space: pre-wrap;
      word-break: break-all;
      color: #aaa;
    }
    .status { text-align: center; color: #888; padding: 1rem; font-size: 0.85rem; }
    .error { color: #ff6b6b; }
    .payment-notice {
      background: #1a1a00;
      border: 1px solid #444400;
      border-radius: 8px;
      padding: 1rem;
      margin-bottom: 1rem;
      font-size: 0.85rem;
      color: #cccc88;
    }
    footer { margin-top: auto; padding-top: 2rem; color: #555; font-size: 0.8rem; }
    footer a { color: #00d4aa; text-decoration: none; }
  </style>
</head>
<body>
  <h1>Kite Reputation Oracle</h1>
  <p class="subtitle">AgentProof trust scores for Kite Passport DIDs</p>

  <div class="card">
    <label for="did">Kite Passport DID</label>
    <input type="text" id="did" placeholder="did:kite:0x..." />
    <div class="payment-notice">
      Oracle queries require x402 micropayment on Kite mainnet.
    </div>
    <button id="query-btn" onclick="queryScore()">Query Trust Score</button>
  </div>

  <div id="result" class="card" style="display: none;">
    <div class="score-display">
      <div class="score-number" id="score-value">—</div>
      <div class="score-label">Trust Score (0–100)</div>
    </div>
    <div class="signals-grid" id="signals-grid"></div>
    <div class="vc-section">
      <label>Verifiable Credential</label>
      <div class="vc-json" id="vc-json"></div>
    </div>
  </div>

  <div id="status" class="status"></div>

  <footer>
    Built by <a href="https://agentproof.sh">AgentProof</a> &mdash;
    ERC-8004 cross-chain reputation oracle
  </footer>

  <script>
    const API_BASE = window.location.origin;

    async function queryScore() {
      const did = document.getElementById('did').value.trim();
      if (!did) return;

      const btn = document.getElementById('query-btn');
      const status = document.getElementById('status');
      const result = document.getElementById('result');

      btn.disabled = true;
      status.textContent = 'Querying oracle...';
      status.className = 'status';
      result.style.display = 'none';

      try {
        // First call without payment to get 402 response
        const initial = await fetch(`${API_BASE}/api/score?did=${encodeURIComponent(did)}`);

        if (initial.status === 402) {
          status.textContent = 'Payment required. Simulating x402 payment on Kite testnet...';

          // Simulate payment header for demo
          const paymentPayload = btoa(JSON.stringify({
            scheme: 'gokite-aa',
            network: 'kite-testnet',
            payload: 'demo-payment-' + Date.now()
          }));

          const res = await fetch(`${API_BASE}/api/score?did=${encodeURIComponent(did)}`, {
            headers: { 'X-PAYMENT': paymentPayload }
          });

          if (!res.ok) throw new Error(`Oracle returned ${res.status}`);
          const data = await res.json();
          displayResult(data);
        } else if (initial.ok) {
          const data = await initial.json();
          displayResult(data);
        } else {
          throw new Error(`Unexpected response: ${initial.status}`);
        }
      } catch (err) {
        status.textContent = err.message;
        status.className = 'status error';
      } finally {
        btn.disabled = false;
      }
    }

    function displayResult(data) {
      const result = document.getElementById('result');
      const status = document.getElementById('status');

      document.getElementById('score-value').textContent = data.score;
      status.textContent = `${data.txCount} transactions indexed on Kite chain`;

      const grid = document.getElementById('signals-grid');
      grid.innerHTML = '';
      const signalLabels = {
        paymentReliability: 'Payment Reliability',
        counterpartyDiversity: 'Counterparty Diversity',
        accountAge: 'Account Age',
        spendConsistency: 'Spend Consistency',
        slaAdherence: 'SLA Adherence',
        activityTrend: 'Activity Trend'
      };

      for (const [key, label] of Object.entries(signalLabels)) {
        const val = data.signals[key] ?? 0;
        const div = document.createElement('div');
        div.className = 'signal';
        div.innerHTML = `<div class="signal-name">${label}</div><div class="signal-value">${(val * 100).toFixed(0)}%</div>`;
        grid.appendChild(div);
      }

      document.getElementById('vc-json').textContent = JSON.stringify(data.vc, null, 2);
      result.style.display = 'block';
    }
  </script>
</body>
</html>
